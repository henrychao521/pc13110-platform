<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程實驗室 ｜ PC13110 工程設計學習平台</title>
<meta name="description" content="PC13110 工程設計學習平台的像素風工程實驗室:建立你的工程師角色,在實驗室中走動,走進傳送門進入五大主題關卡。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/pixel.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎮%3C/text%3E%3C/svg%3E">
</head>
<body class="lobby">

<!-- ===== 角色建立 ===== -->
<div id="creator" class="cr-overlay">
  <div class="cr-box">
    <div class="cr-title mono">CREATE YOUR ENGINEER</div>
    <div class="cr-sub">打造你的工程師角色,走進實驗室開始闖關</div>
    <div class="cr-main">
      <div class="cr-stage">
        <canvas id="prevCanvas" width="150" height="210"></canvas>
      </div>
      <div class="cr-controls" id="crControls"></div>
    </div>
    <label class="cr-namewrap">
      <span>暱稱 / 座號</span>
      <input id="crName" type="text" maxlength="12" placeholder="例:01 小明" autocomplete="off">
    </label>
    <button id="crStart" class="cr-start">▶ 進入實驗室</button>
  </div>
</div>

<!-- ===== 世界 ===== -->
<header class="px-topbar">
  <div class="px-logo">⚙</div>
  <div class="px-brand">
    <div class="t1 mono">PC13110</div>
    <div class="t2">工程實驗室</div>
  </div>
  <div class="hud-chip"><span id="hudName">—</span>　<span id="hudPct">總進度 0%</span></div>
  <div class="hud-chip net-chip" id="netChip">單機模式</div>
  <nav class="px-topnav">
    <button class="px-navbtn" id="rebuildBtn">🎨 重建角色</button>
    <a class="px-navbtn" href="index.html">🖥 經典首頁</a>
  </nav>
</header>

<main class="world-wrap">
  <div class="world-stage">
    <canvas id="world"></canvas>
    <div id="prompt" class="world-prompt"></div>
  </div>
  <div class="world-hint mono">方向鍵 / WASD 移動　·　走到傳送門按 E 進入關卡</div>
</main>

<!-- 觸控控制(手機:虛擬搖桿) -->
<div class="touch-ctl">
  <div class="joystick" id="joystick" aria-label="移動搖桿">
    <div class="joy-ring"></div>
    <div class="joy-knob" id="joyKnob"></div>
  </div>
  <button id="actionBtn" class="action-btn">進入</button>
</div>

<footer class="px-footer">
  <div>© 趙珩宇老師製作・PC13110 工程設計學習平台</div>
  <div class="mono">PIXEL LAB ・ SINGLE-PLAYER BUILD</div>
  <div>想用一般介面?<a href="index.html">回到經典首頁 →</a></div>
</footer>

<script src="js/main.js"></script>
<script src="js/audio.js"></script>
<script src="js/lobby.js"></script>
</body>
</html>
