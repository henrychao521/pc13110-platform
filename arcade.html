<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下課遊樂區 ｜ PC13110 工程設計學習平台</title>
<meta name="description" content="PC13110 工程設計學習平台的下課遊樂區:像素小遊戲、占卜師、科技新聞與即時氣象。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/pixel.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🕹️%3C/text%3E%3C/svg%3E">
<style>
  .arc-wrap {
    max-width: 1080px; margin: 22px auto 0; padding: 0 20px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  /* 上下選單 */
  .arc-menu {
    width: 232px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px;
  }
  .arc-item {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 10px 12px; background: var(--px-panel);
    border: 3px solid var(--px-ink); box-shadow: 3px 3px 0 var(--px-ink);
    transition: transform .07s, background .12s;
  }
  .arc-item:hover { background: var(--px-line); }
  .arc-item.on { background: var(--px-panel2); border-color: var(--px-gold); box-shadow: 3px 3px 0 var(--px-gold); }
  .arc-item .ai-ic { font-size: 22px; }
  .arc-item .ai-name { font-size: 13.5px; font-weight: 800; }
  .arc-item .ai-kind { font-size: 9px; color: var(--px-dim); }
  .arc-menu-sep { font-size: 9px; color: var(--px-dim); margin: 6px 0 1px 2px; }
  /* 旁邊面板 */
  .arc-panel {
    flex: 1; min-height: 420px; background: var(--px-panel);
    border: 4px solid var(--px-ink); box-shadow: 7px 7px 0 var(--px-ink);
    padding: 22px;
  }
  .ap-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .ap-ic { font-size: 40px; }
  .ap-title { font-size: 19px; font-weight: 900; }
  .ap-tag { font-size: 10px; color: var(--px-ink); background: var(--px-gold);
    padding: 3px 8px; border: 2px solid var(--px-ink); }
  .ap-desc { font-size: 14px; color: var(--px-text); line-height: 1.85; margin: 12px 0; }
  .ap-meta { font-size: 12px; color: var(--px-dim); line-height: 1.8; }
  .ap-btn {
    margin-top: 16px; font-family: "Noto Sans TC", sans-serif; font-size: 14px; font-weight: 900;
    color: var(--px-ink); background: var(--px-gold);
    border: 3px solid var(--px-ink); box-shadow: 0 5px 0 var(--px-ink);
    padding: 12px 26px; cursor: pointer;
  }
  .ap-btn:active { transform: translateY(5px); box-shadow: 0 0 0 var(--px-ink); }
  .ap-btn.ghost { background: var(--px-panel2); color: var(--px-text); }
  /* 占卜 / 新聞 / 氣象 共用卡片 */
  .ap-card {
    background: var(--px-bg); border: 3px solid var(--px-ink);
    padding: 16px; margin-top: 14px; line-height: 1.9;
  }
  .ap-fortune-stars { font-size: 18px; color: var(--px-gold); letter-spacing: 3px; }
  .ap-fortune-title { font-size: 17px; font-weight: 900; color: var(--px-gold); margin: 6px 0; }
  .ap-fortune-line { font-size: 14px; color: var(--px-text); }
  .ap-fortune-line b { color: #38e0a8; }
  .ap-news-item { display: block; padding: 9px 0; border-bottom: 2px solid var(--px-line); }
  .ap-news-item:last-child { border-bottom: 0; }
  .ap-news-rank { color: var(--px-gold); font-weight: 900; }
  .ap-news-title { font-size: 13.5px; font-weight: 700; }
  .ap-news-meta { font-size: 11px; color: var(--px-dim); }
  .ap-wx-big { font-size: 52px; }
  .ap-wx-temp { font-size: 34px; font-weight: 900; color: var(--px-gold); font-family: "Press Start 2P", monospace; }
  .ap-wx-row { display: flex; gap: 22px; flex-wrap: wrap; font-size: 13px; margin-top: 10px; }
  .ap-wx-row b { color: #38e0a8; }
  .ap-loading { font-size: 13px; color: var(--px-dim); }
  /* 遊玩覆蓋層 */
  .arc-play { position: fixed; inset: 0; z-index: 200; background: #0d0c1f;
    display: flex; flex-direction: column; }
  .arc-play.hidden { display: none; }
  .arc-play-bar {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--px-panel); border-bottom: 4px solid var(--px-ink);
  }
  .arc-play-bar .pb-title { font-weight: 900; font-size: 14px; color: var(--px-gold); }
  .arc-play-bar button {
    margin-left: auto; font-family: "Noto Sans TC", sans-serif; font-size: 13px; font-weight: 800;
    color: var(--px-text); background: var(--px-panel2);
    border: 3px solid var(--px-ink); box-shadow: 3px 3px 0 var(--px-ink); padding: 8px 14px; cursor: pointer;
  }
  .arc-play-bar button:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--px-ink); }
  #playFrame { flex: 1; width: 100%; border: 0; background: #0d0c1f; }

  @media (max-width: 720px) {
    .arc-wrap { flex-direction: column; }
    .arc-menu { width: 100%; }
    .arc-panel { width: 100%; min-height: 0; }
  }
</style>
</head>
<body class="lobby">

<header class="px-topbar">
  <div class="px-logo">🕹️</div>
  <div class="px-brand">
    <div class="t1 mono">PC13110</div>
    <div class="t2">下課遊樂區</div>
  </div>
  <nav class="px-topnav">
    <a class="px-navbtn" href="lobby.html">🧪 像素大廳</a>
    <a class="px-navbtn" href="index.html">🖥 經典首頁</a>
  </nav>
</header>

<main class="arc-wrap">
  <nav class="arc-menu" id="arcMenu"></nav>
  <section class="arc-panel" id="arcPanel"></section>
</main>

<div id="playOverlay" class="arc-play hidden">
  <div class="arc-play-bar">
    <span class="pb-title" id="playTitle"></span>
    <button id="playClose">✕ 關閉遊戲</button>
  </div>
  <iframe id="playFrame" title="遊戲畫面"></iframe>
</div>

<footer class="px-footer">
  <div>© 趙珩宇老師製作・PC13110 工程設計學習平台</div>
  <div class="mono">PIXEL ARCADE</div>
  <div>用方向鍵 ▲▼ 選擇,或直接點選單。</div>
</footer>

<script src="js/audio.js"></script>
<script src="js/arcade.js"></script>
</body>
</html>
