<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素貪食蛇 ｜ PC13110 遊樂區</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #14132b; color: #e8e8f5;
    font-family: "Noto Sans TC", -apple-system, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; padding: 16px;
    -webkit-user-select: none; user-select: none;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  .mono { font-family: "Press Start 2P", monospace; }
  .title { font-size: 13px; color: #ffd34e; text-shadow: 2px 2px 0 #000; letter-spacing: .04em; }
  .hud { display: flex; gap: 26px; font-size: 11px; }
  .hud b { color: #ffd34e; }
  #cv {
    border: 4px solid #0b0b18; box-shadow: 7px 7px 0 #0b0b18;
    background: #1a1933; image-rendering: pixelated;
    max-width: 92vw; max-height: 56vh; height: auto; touch-action: none; cursor: pointer;
  }
  .dpad {
    display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); gap: 5px;
  }
  .dpad button {
    font-size: 16px; color: #e8e8f5; background: #2c2a5a;
    border: 3px solid #0b0b18; box-shadow: 3px 3px 0 #0b0b18;
    cursor: pointer; font-family: inherit;
  }
  .dpad button:active { transform: translate(3px,3px); box-shadow: 0 0 0 #0b0b18; }
  .dpad .u { grid-area: 1/2; } .dpad .l { grid-area: 2/1; }
  .dpad .r { grid-area: 2/3; } .dpad .d { grid-area: 3/2; }
  .hint { font-size: 11px; color: #9a98c8; text-align: center; line-height: 1.7; }
</style>
</head>
<body>

<div class="title mono">PIXEL SNAKE</div>
<div class="hud mono">
  <span>分數 <b id="score">0</b></span>
  <span>最高 <b id="best">0</b></span>
</div>
<canvas id="cv" width="378" height="378"></canvas>
<div class="dpad">
  <button class="u" data-d="up" aria-label="上">▲</button>
  <button class="l" data-d="left" aria-label="左">◀</button>
  <button class="r" data-d="right" aria-label="右">▶</button>
  <button class="d" data-d="down" aria-label="下">▼</button>
</div>
<div class="hint">方向鍵 / WASD・滑動・或用下方按鈕操控　|　空白鍵開始 / 重來</div>

<script>
const GW = 21, GH = 21, CELL = 18;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const BEST_KEY = 'pc13110_snake_best';

let snake, dir, nextDir, food, score, state, timer, speed;
let best = +(localStorage.getItem(BEST_KEY) || 0);
document.getElementById('best').textContent = best;

function reset() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  score = 0; speed = 140;
  document.getElementById('score').textContent = 0;
  placeFood();
  state = 'ready';
  draw();
}
function placeFood() {
  do {
    food = { x: (Math.random() * GW) | 0, y: (Math.random() * GH) | 0 };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}
function start() {
  if (state === 'play') return;
  reset();
  state = 'play';
  loop();
}
function loop() {
  clearTimeout(timer);
  timer = setTimeout(() => { if (state === 'play') { step(); loop(); } }, speed);
}
function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.y < 0 || head.x >= GW || head.y >= GH ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    if (speed > 70) speed -= 4;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}
function gameOver() {
  state = 'over';
  if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); document.getElementById('best').textContent = best; }
  draw();
}
function cell(x, y, color, inset) {
  ctx.fillStyle = color;
  ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
  if (inset) {
    ctx.fillStyle = inset;
    ctx.fillRect(x * CELL + 4, y * CELL + 4, CELL - 8, CELL - 8);
  }
}
function draw() {
  ctx.fillStyle = '#1a1933';
  ctx.fillRect(0, 0, cv.width, cv.height);
  /* 格線 */
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  for (let i = 1; i < GW; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, cv.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(cv.width, i * CELL); ctx.stroke();
  }
  /* 食物 */
  cell(food.x, food.y, '#ff6b6b', '#ffd1d1');
  /* 蛇 */
  snake.forEach((s, i) => {
    if (i === 0) cell(s.x, s.y, '#ffd34e', '#fff0b8');
    else cell(s.x, s.y, i % 2 ? '#2dd4a7' : '#38e07a');
  });
  /* 提示文字 */
  if (state !== 'play') {
    ctx.fillStyle = 'rgba(11,11,24,.78)';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd34e';
    ctx.font = '16px "Press Start 2P", monospace';
    ctx.fillText(state === 'over' ? 'GAME OVER' : 'PIXEL SNAKE', cv.width / 2, cv.height / 2 - 24);
    ctx.fillStyle = '#e8e8f5';
    ctx.font = '700 14px "Noto Sans TC", sans-serif';
    if (state === 'over') ctx.fillText('得分 ' + score, cv.width / 2, cv.height / 2 + 6);
    ctx.fillStyle = '#9a98c8';
    ctx.font = '700 12px "Noto Sans TC", sans-serif';
    ctx.fillText(state === 'over' ? '按空白鍵 / 點畫面　再玩一次' : '按空白鍵 / 點畫面　開始',
      cv.width / 2, cv.height / 2 + (state === 'over' ? 30 : 14));
  }
}
function turn(d) {
  const map = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };
  const nd = map[d];
  if (!nd) return;
  if (state !== 'play') { start(); return; }
  if (nd.x === -dir.x && nd.y === -dir.y) return;   /* 不能回頭 */
  nextDir = nd;
}

/* ---- 輸入 ---- */
const KEYS = {
  arrowup: 'up', w: 'up', arrowdown: 'down', s: 'down',
  arrowleft: 'left', a: 'left', arrowright: 'right', d: 'right',
};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === ' ' || k === 'enter') { e.preventDefault(); start(); return; }
  if (KEYS[k]) { e.preventDefault(); turn(KEYS[k]); }
});
cv.addEventListener('click', () => { if (state !== 'play') start(); });
document.querySelectorAll('.dpad button').forEach(b => {
  b.addEventListener('click', () => turn(b.dataset.d));
});
/* 滑動 */
let tsx = 0, tsy = 0;
cv.addEventListener('touchstart', e => { const t = e.touches[0]; tsx = t.clientX; tsy = t.clientY; }, { passive: true });
cv.addEventListener('touchend', e => {
  const t = e.changedTouches[0], dx = t.clientX - tsx, dy = t.clientY - tsy;
  if (Math.abs(dx) < 18 && Math.abs(dy) < 18) { if (state !== 'play') start(); return; }
  if (Math.abs(dx) > Math.abs(dy)) turn(dx > 0 ? 'right' : 'left');
  else turn(dy > 0 ? 'down' : 'up');
}, { passive: true });

reset();
</script>
</body>
</html>
