<body>

<div class="title mono">TAIWAN GEO-GUESS</div>

  ["台塑星能彰濱風力發電場",24.1165,120.3951,0,"沿海防風林間的陸域風機。流體力學評估風機尾流效應（Wake effect）與排列間距，以達最大發電效能之最佳化佈局。"],
  ["高雄大林發電廠",22.5361,120.3346,0,"筒式室內煤倉。為避免煤塵逸散造成的環境污染，運用巨型鋼構穹頂將儲煤場完全室內化的環保建築工程。"],
  ["屏東核三廠南部展示館",21.9568,120.7511,1,"太陽能光電與風力展示。藉由實體縮尺模型展示發電原理，推廣能源教育（呼應第一章工程與社會環境互動）。"],
  ["花蓮和平電廠",24.3015,121.7501,0,"民營火力發電與專用港。深水碼頭的卸煤機具及防波堤設計，與隱藏於山壁間的煙囪景觀環保妥協工程。"],
  ["台電高屏供電區營運處",22.6515,120.3168,0,"變電站與電力調度。變壓器（Transformer）電壓轉換、斷路器（Circuit Breaker）與輸電線路保護繼電系統 。"],
  ["國家地震工程研究中心",25.0152,121.5386,0,"巨型地震模擬震動台。利用大型液壓伺服系統模擬多維度地震波，進行全尺寸建築的動態抗震破壞測試。"],
  ["新竹科學園區汙水處理廠",24.7816,121.0028,0,"科技業工業廢水處理。半導體產業排放的重金屬與化學酸鹼廢液，如何透過生化過濾與自動中和系統淨化（環境責任）。"],
  ["台達電內湖總部綠建築",25.0745,121.5723,0,"樓宇自動化與節能系統。整合變頻空調、LED 節能照明及電梯馬達能量回收，落實綠能企業的碳排承諾。"],
  ["中油第三天然氣接收站",25.0352,121.0368,0,"LNG 接收站與低溫儲槽。攝氏零下162度液化天然氣的極低溫儲存材料科學，以及保護藻礁生態的離岸棧橋工程。"],
  ["中央大學鹿林天文台",23.4686,120.8728,0,"高山天文望遠鏡。精密光學追星儀器的無背隙齒輪驅動系統，與防寒、防風、防震的圓頂開啟機電整合機構。"],
  ["屏東大鵬灣水上飛機景觀台",22.4485,120.4851,0,"太陽光電與遊憩結合。早期軍用基地改建，保留建築幾何歷史，並融入太陽光電的區域活化與結構翻新工程。"],
];
const TW = [
  [25.30,121.54],[25.13,121.94],[24.85,121.83],[24.60,121.87],[24.00,121.62],
  [23.40,121.50],[22.75,121.15],[22.00,120.92],[21.90,120.85],[22.30,120.65],
  [22.60,120.27],[23.00,120.10],[23.45,120.13],[24.05,120.38],[24.40,120.55],
  [24.70,120.85],[25.00,121.10],[25.18,121.41],
];
/* Mapillary 取樣種子(經度,緯度)—— 台灣各地有街景覆蓋的城鎮 */
const SEEDS = [
  [121.565,25.033],[120.673,24.144],[120.205,22.997],[120.301,22.627],
  [121.606,23.991],[121.754,24.757],[120.968,24.804],[120.449,23.479],
  [120.913,23.852],[121.144,22.758],[121.741,25.128],[121.301,24.993],
  [120.488,22.669],
];
const TOKEN_KEY = 'pc13110_mapillary_token';

const LAT0 = 21.7, LAT1 = 25.45, LON0 = 119.85, LON1 = 122.15;
const cv = document.getElementById('map'), ctx = cv.getContext('2d');
const MW = cv.width, MH = cv.height;
ctx.imageSmoothingEnabled = false;
const $ = id => document.getElementById(id);

function geoXY(lat, lon) {
  return { x: (lon - LON0) / (LON1 - LON0) * MW, y: (LAT1 - lat) / (LAT1 - LAT0) * MH };
}
function xyGeo(x, y) {
  return { lon: LON0 + x / MW * (LON1 - LON0), lat: LAT1 - y / MH * (LAT1 - LAT0) };
}
/* 工程地景模式:以 Esri World Imagery 衛星空照圖呈現地點(無需金鑰)
 * ZOOMS = 各視野等級的半寬(Web Mercator 公尺),由近到遠 */
const ZOOMS = [665, 1330, 3325, 8000, 20000];
const ZOOM_NAMES = ['街廓', '近', '中', '遠', '最遠'];
function esriUrl(lat, lon, hw) {
  const R = 20037508.34;
  const mx = lon * R / 180;
  const my = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180) * R / 180;
  const hh = hw * 0.75;                  /* 維持 4:3 */
  const bbox = [mx - hw, my - hh, mx + hw, my + hh].join(',');
  return 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/export'
    + '?bbox=' + bbox + '&size=1024,768&format=jpg&f=image';
}
function distKm(a, b) {
  const R = 6371, t = Math.PI / 180;
  const dLa = (b.lat - a.lat) * t, dLo = (b.lon - a.lon) * t;
  const h = Math.sin(dLa / 2) ** 2 +
    Math.cos(a.lat * t) * Math.cos(b.lat * t) * Math.sin(dLo / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

let mode, rounds, idx, total, guess, actual, state, current, roundCount, zoomIdx;

/* 工程地景:依目前視野等級重新載入衛星空照圖 */
function applyZoom() {
  zoomIdx = Math.max(0, Math.min(ZOOMS.length - 1, zoomIdx));
  $('zoomOut').disabled = zoomIdx >= ZOOMS.length - 1;
  $('zoomIn').disabled = zoomIdx <= 0;
  $('zoomLabel').textContent = '視野:' + ZOOM_NAMES[zoomIdx] + '（➖ 拉遠看地理位置、➕ 拉近看工程結構）';
  const img = $('photo');
  $('photoMsg').classList.add('hidden');
  img.style.display = 'block';
  img.src = esriUrl(current.lat, current.lon, ZOOMS[zoomIdx]);
}

/* ---------- Mapillary 取街景 ---------- */
async function fetchMapillaryShot() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) return null;
  for (let attempt = 0; attempt < 9; attempt++) {
    const seed = SEEDS[(Math.random() * SEEDS.length) | 0];
    const cx = seed[0] + (Math.random() - 0.5) * 0.045;
    const cy = seed[1] + (Math.random() - 0.5) * 0.045;
    let half = 0.0045;
    for (let shrink = 0; shrink < 3; shrink++) {
      const bbox = [cx - half, cy - half, cx + half, cy + half].map(n => n.toFixed(5)).join(',');
      const url = 'https://graph.mapillary.com/images?access_token=' + encodeURIComponent(token) +
        '&fields=id,computed_geometry,thumb_1024_url&bbox=' + bbox + '&limit=8';
      let j;
      try { j = await (await fetch(url)).json(); }
      catch (e) { return { error: 'network' }; }
      if (j.error) {
        if (/reduce/i.test(j.error.message || '')) { half *= 0.5; continue; }
        return { error: 'auth' };          /* token 無效等 */
      }
      const list = (j.data || []).filter(d => d.thumb_1024_url && d.computed_geometry);
      if (list.length) {
        const p = list[(Math.random() * list.length) | 0];
        const c = p.computed_geometry.coordinates;
        return { url: p.thumb_1024_url, lon: c[0], lat: c[1], id: p.id };
      }
      break;                               /* 空的 → 換種子 */
    }
  }
  return null;                             /* 試完都沒有 */
}

/* 工程地景:抓某座標附近的 Mapillary 實景影像(由近而遠擴大搜尋範圍) */
async function fetchMapillaryAt(lat, lon) {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) return null;
  for (const half of [0.0013, 0.0027, 0.005]) {     /* 約 145m / 300m / 555m */
    const bbox = [lon - half, lat - half, lon + half, lat + half]
      .map(n => n.toFixed(6)).join(',');
    const url = 'https://graph.mapillary.com/images?access_token=' + encodeURIComponent(token) +
      '&fields=id,thumb_1024_url&bbox=' + bbox + '&limit=15';
    let j;
    try { j = await (await fetch(url)).json(); }
    catch (e) { return null; }
    if (j.error) return null;                       /* token 無效或範圍過大 → 退回空照圖 */
    const list = (j.data || []).filter(d => d.thumb_1024_url);
    if (list.length) return { url: list[(Math.random() * list.length) | 0].thumb_1024_url };
  }
  return null;                                      /* 此座標無 Mapillary 覆蓋 */
}

/* ---------- 流程 ---------- */
function startGame(m) {
  mode = m;
  idx = 0; total = 0;
  $('score').textContent = 0;
  $('overlay').classList.add('hidden');
  if (m === 'engineering') {
    roundCount = 10;
    $('modeLabel').textContent = '🏗 工程地景';
    rounds = SITES.slice().sort(() => Math.random() - 0.5).slice(0, roundCount)
      .map(s => ({ name: s[0], lat: s[1], lon: s[2], ch: s[3], tip: s[4] }));
  } else if (m === 'curated') {
    roundCount = 5;
    $('modeLabel').textContent = '📷 精選地景';
    rounds = LOCS.slice().sort(() => Math.random() - 0.5).slice(0, roundCount);
  } else {
    roundCount = 5;
    $('modeLabel').textContent = '🛰 Mapillary 即時';
  }
  $('roundTotal').textContent = roundCount;
  loadRound();
}
async function loadRound() {
  guess = null; actual = null;
  $('round').textContent = idx + 1;
  $('actBtn').disabled = true;
  $('actBtn').textContent = '確認猜測';
  $('photo').onerror = null;
  $('zoombar').classList.remove('on');
  $('photoClue').classList.remove('on');
  if (mode === 'curated') {
    const loc = rounds[idx];
    current = { src: 'img/' + loc.img, lat: loc.lat, lon: loc.lon, name: loc.name, blurb: loc.blurb, by: loc.by };
    setPhoto(current.src, '📷 ' + loc.by + '・Wikimedia Commons');
    $('result').textContent = '點地圖選一個位置';
    state = 'guess';
  } else if (mode === 'engineering') {
    const s = rounds[idx];
    current = { lat: s.lat, lon: s.lon, name: s.name, blurb: s.tip, ch: s.ch };
    $('photo').onerror = () => {
      if (state !== 'guess') return;
      state = 'error';
      showMsg('⚠ 影像載入失敗');
      $('result').innerHTML = '影像載入失敗,按下方「重試」再試一次。';
      $('actBtn').textContent = '重試'; $('actBtn').disabled = false;
    };
    $('photoClue').textContent = '🔍 觀察提示:' + s.tip;
    $('photoClue').classList.add('on');
    /* 先試 Mapillary 實景照,查無覆蓋則退回 Esri 衛星空照圖 */
    state = 'loading';
    let shot = null;
    if (localStorage.getItem(TOKEN_KEY)) {
      showMsg('🔍 搜尋實景影像中…');
      $('result').textContent = '搜尋實景影像中,請稍候…';
      shot = await fetchMapillaryAt(s.lat, s.lon);
    }
    if (shot && shot.url) {
      current.imgType = 'mapillary';
      $('zoombar').classList.remove('on');
      setPhoto(shot.url, '📷 Mapillary 實景影像・CC BY-SA');
      $('result').textContent = '看實景照,在地圖上點出這個工程地點的位置。';
    } else {
      current.imgType = 'sat';
      $('photoCap').textContent = '🛰 衛星空照圖・Esri / Maxar / Earthstar Geographics';
      $('zoombar').classList.add('on');
      zoomIdx = 3;
      applyZoom();
      $('result').textContent = '用下方「拉遠／拉近」觀察地形,再到地圖上點出位置。';
    }
    state = 'guess';
  } else {
    state = 'loading';
    showMsg('🛰 連線 Mapillary,載入街景中…');
    $('result').textContent = '取得街景中,請稍候…';
    const shot = await fetchMapillaryShot();
    if (!shot || shot.error) {
      state = 'error';
      showMsg(shot && shot.error === 'auth' ? '⚠ Mapillary token 無效'
        : shot && shot.error === 'network' ? '⚠ 網路連線失敗'
        : '⚠ 這次沒抓到街景');
      $('result').innerHTML = '取得街景失敗,按下方「重試」再試一次。';
      $('actBtn').textContent = '重試'; $('actBtn').disabled = false;
      return;
    }
    current = { src: shot.url, lat: shot.lat, lon: shot.lon, name: null, by: 'Mapillary 街景・CC BY-SA' };
    setPhoto(current.src, '📷 Mapillary 街景・CC BY-SA');
    $('result').textContent = '點地圖選一個位置';
    state = 'guess';
  }
  drawMap();
}
function setPhoto(src, cap) {
  const img = $('photo');
  $('photoMsg').classList.add('hidden');
  img.style.display = 'block';
  img.src = src;
  $('photoCap').textContent = cap;
}
function showMsg(text) {
  $('photo').style.display = 'none';
  const m = $('photoMsg');
  m.textContent = text; m.classList.remove('hidden');
  $('photoCap').textContent = '';
}

function drawMap() {
  ctx.fillStyle = '#10204a'; ctx.fillRect(0, 0, MW, MH);
  ctx.beginPath();
  TW.forEach((p, i) => {
    const xy = geoXY(p[0], p[1]);
    i ? ctx.lineTo(xy.x, xy.y) : ctx.moveTo(xy.x, xy.y);
  });
  ctx.closePath();
  ctx.fillStyle = '#3b6b3a'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = '#bce8a8'; ctx.stroke();
  if (guess) marker(guess, '#ffd34e', '你');
  if (actual) {
    if (guess) {
      const g = geoXY(guess.lat, guess.lon), a = geoXY(actual.lat, actual.lon);
      ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]);
      ctx.beginPath(); ctx.moveTo(g.x, g.y); ctx.lineTo(a.x, a.y); ctx.stroke();
      ctx.setLineDash([]);
    }
    marker(actual, '#ff6b6b', '✓');
  }
}
function marker(pt, color, label) {
  const { x, y } = geoXY(pt.lat, pt.lon);
  ctx.fillStyle = color;
  ctx.fillRect(x - 5, y - 5, 10, 10);
  ctx.strokeStyle = '#0b0b18'; ctx.lineWidth = 2;
  ctx.strokeRect(x - 5, y - 5, 10, 10);
  ctx.fillStyle = '#fff'; ctx.font = '700 10px "Noto Sans TC",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y - 13);
}
cv.addEventListener('click', e => {
  if (state !== 'guess') return;
  const r = cv.getBoundingClientRect();
  guess = xyGeo((e.clientX - r.left) * (MW / r.width), (e.clientY - r.top) * (MH / r.height));
  $('actBtn').disabled = false;
  $('result').textContent = '按「確認猜測」送出。';
  drawMap();
});
function confirmGuess() {
  actual = { lat: current.lat, lon: current.lon };
  const d = distKm(guess, actual);
  const pts = Math.round(1000 * Math.exp(-d / 55));
  total += pts; state = 'reveal';
  $('score').textContent = total;
  let head;
  if (mode === 'engineering') {
    if (current.imgType === 'sat') { zoomIdx = 1; applyZoom(); }  /* 空照圖揭曉時拉近 */
    const chTxt = current.ch ? `第${'一二三四五'[current.ch - 1]}章 ｜ ` : '';
    head = `正解:<span class="rn">${current.name}</span><br>` +
      `<span style="color:#7fc7ff">${chTxt}</span>${current.blurb}<br>`;
  } else if (current.name) {
    head = `正解:<span class="rn">${current.name}</span><br>${current.blurb}<br>`;
  } else {
    head = `📍 這是 Mapillary 上的一個實際街景點。<br>`;
  }
  $('result').innerHTML = head +
    `距離 <b>${d < 1 ? '<1' : Math.round(d)}</b> 公里・本題 <b>${pts}</b> 分`;
  $('actBtn').textContent = idx < roundCount - 1 ? '下一題 ▶' : '看成績';
  drawMap();
}
function nextRound() { idx++; (idx >= roundCount) ? endGame() : loadRound(); }
function endGame() {
  state = 'over';
  const max = roundCount * 1000;
  const rank = total >= max * 0.84 ? '🏆 台灣地理達人' : total >= max * 0.6 ? '🌟 在地通'
    : total >= max * 0.36 ? '🙂 還不錯' : '💪 再接再厲';
  $('ovBox').innerHTML =
    `<h1>挑戰結束!</h1><div class="big mono">${total} / ${max}</div>` +
    `<p>你的稱號:<b>${rank}</b></p>` +
    `<button id="againBtn">再玩一次</button>`;
  $('againBtn').addEventListener('click', showStart);
  $('overlay').classList.remove('hidden');
}
$('actBtn').addEventListener('click', () => {
  if (state === 'guess') confirmGuess();
  else if (state === 'reveal') nextRound();
  else if (state === 'error') loadRound();
});
$('zoomOut').addEventListener('click', () => {
  if (mode === 'engineering' && (state === 'guess' || state === 'reveal')) { zoomIdx++; applyZoom(); }
});
$('zoomIn').addEventListener('click', () => {
  if (mode === 'engineering' && (state === 'guess' || state === 'reveal')) { zoomIdx--; applyZoom(); }
});

/* ---------- 開始畫面 / token 設定 ---------- */
function showStart() {
  $('overlay').classList.remove('hidden');
  $('ovBox').innerHTML =
    `<h1>街景定位挑戰</h1>` +
    `<p>看照片或衛星空照圖,在地圖上猜出它在台灣的位置。越接近正解、分數越高!</p>` +
    `<button id="mEng">🏗 工程地景挑戰<br><span style="font-size:10px;font-weight:400">200 個課程工程景點・實景照＋衛星空照圖・每局隨機 10 題</span></button>` +
    `<button id="mCurated" class="btn-ghost">📷 精選地景(10 個台灣名勝)</button>` +
    `<button id="mMapi" class="btn-ghost">🛰 Mapillary 即時街景</button>`;
  $('mEng').addEventListener('click', () => startGame('engineering'));
  $('mCurated').addEventListener('click', () => startGame('curated'));
  $('mMapi').addEventListener('click', () => {
    localStorage.getItem(TOKEN_KEY) ? startGame('mapillary') : showTokenSetup();
  });
}
function showTokenSetup() {
  $('ovBox').innerHTML =
    `<h1>Mapillary 設定</h1>` +
    `<p>即時街景需要一組免費的 Mapillary token。</p>` +
    `<p class="lead">到 <a href="https://www.mapillary.com/dashboard/developers" target="_blank">mapillary.com</a> ` +
    `→ Developers → 註冊應用程式(權限只開 READ),取得 <code>MLY|…</code> 開頭的 token,貼在下方:</p>` +
    `<input id="tokIn" placeholder="MLY|...|..." autocomplete="off">` +
    `<button id="tokSave">儲存並開始</button>` +
    `<button id="tokBack" class="btn-ghost">← 返回</button>`;
  $('tokSave').addEventListener('click', () => {
    const v = $('tokIn').value.trim();
    if (!v.startsWith('MLY')) { $('tokIn').style.borderColor = '#ff6b6b'; return; }
    localStorage.setItem(TOKEN_KEY, v);
    startGame('mapillary');
  });
  $('tokBack').addEventListener('click', showStart);
}

drawMap();
showStart();
</script>
