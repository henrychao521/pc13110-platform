<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程記憶配對 ｜ PC13110 遊樂區</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #14132b; color: #e8e8f5;
    font-family: "Noto Sans TC", -apple-system, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; padding: 18px;
    -webkit-user-select: none; user-select: none;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  .mono { font-family: "Press Start 2P", monospace; }
  .title { font-size: 13px; color: #ffd34e; text-shadow: 2px 2px 0 #000; letter-spacing: .04em; }
  .hud { display: flex; gap: 22px; font-size: 11px; }
  .hud b { color: #ffd34e; }
  .board {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px;
    width: min(92vw, 380px); padding: 12px;
    background: #1a1933; border: 4px solid #0b0b18; box-shadow: 7px 7px 0 #0b0b18;
  }
  .card {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 34px; cursor: pointer;
    background: #2c2a5a; border: 3px solid #0b0b18; box-shadow: 3px 3px 0 #0b0b18;
    transition: transform .08s, background .12s;
  }
  .card .q { color: #6b69a8; font-family: "Press Start 2P", monospace; font-size: 18px; }
  .card.up { background: #3a3870; }
  .card.up:not(.matched) { transform: scale(1.04); }
  .card.matched { background: #1f6d52; border-color: #2dd4a7; cursor: default; }
  .card.down:active { transform: translate(3px,3px); box-shadow: 0 0 0 #0b0b18; }
  .msg { font-size: 13px; color: #9a98c8; min-height: 20px; text-align: center; }
  .msg b { color: #2dd4a7; }
  button {
    font-family: "Noto Sans TC", sans-serif; font-size: 13px; font-weight: 900; color: #14132b;
    background: #ffd34e; border: 3px solid #0b0b18; box-shadow: 0 5px 0 #0b0b18;
    padding: 10px 22px; cursor: pointer;
  }
  button:active { transform: translateY(5px); box-shadow: 0 0 0 #0b0b18; }
</style>
</head>
<body>

<div class="title mono">ENGINEER MEMORY</div>
<div class="hud mono">
  <span>步數 <b id="moves">0</b></span>
  <span>配對 <b id="pairs">0</b>/8</span>
  <span>最佳 <b id="best">—</b></span>
</div>
<div class="board" id="board"></div>
<div class="msg" id="msg">翻開兩張一樣的工程圖示就配對成功!</div>
<button id="restart">重新洗牌</button>

<script>
const ICONS = ['⚙️', '🔧', '🔌', '💡', '🔋', '📐', '🤖', '🖨️'];
const BEST_KEY = 'pc13110_memory_best';
const board = document.getElementById('board');
let cards, flipped, moves, matched, lock;
let best = +(localStorage.getItem(BEST_KEY) || 0);
document.getElementById('best').textContent = best || '—';

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function reset() {
  cards = shuffle(ICONS.concat(ICONS).map((icon, i) => ({ icon, id: i, state: 'down' })));
  flipped = []; moves = 0; matched = 0; lock = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('msg').innerHTML = '翻開兩張一樣的工程圖示就配對成功!';
  render();
}
function render() {
  board.innerHTML = '';
  cards.forEach((c, idx) => {
    const el = document.createElement('div');
    el.className = 'card ' + c.state;
    el.innerHTML = c.state === 'down' ? '<span class="q">?</span>' : c.icon;
    el.addEventListener('click', () => flip(idx));
    board.appendChild(el);
  });
}
function flip(idx) {
  const c = cards[idx];
  if (lock || c.state !== 'down' || flipped.length >= 2) return;
  c.state = 'up'; flipped.push(idx); render();
  if (flipped.length === 2) {
    moves++; document.getElementById('moves').textContent = moves;
    const [a, b] = flipped;
    if (cards[a].icon === cards[b].icon) {
      cards[a].state = cards[b].state = 'matched';
      flipped = []; matched++;
      document.getElementById('pairs').textContent = matched;
      render();
      if (matched === 8) win();
    } else {
      lock = true;
      setTimeout(() => {
        cards[a].state = cards[b].state = 'down';
        flipped = []; lock = false; render();
      }, 750);
    }
  }
}
function win() {
  const msg = document.getElementById('msg');
  let txt = `🎉 完成!總共用了 <b>${moves}</b> 步`;
  if (!best || moves < best) {
    best = moves; localStorage.setItem(BEST_KEY, best);
    document.getElementById('best').textContent = best;
    txt += '　★ 新紀錄!';
  }
  msg.innerHTML = txt;
}
document.getElementById('restart').addEventListener('click', reset);
reset();
</script>
</body>
</html>
